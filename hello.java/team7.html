<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBin Live Monitor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SmartBin Live Monitoring</h1>
</header>

<div class="container">

<div class="card">
<h2>Bin Level</h2>
<p id="level">Loading...</p>
</div>

<div class="card">
<h2>Temperature</h2>
<p id="temp">Loading...</p>
</div>

<div class="card">
<h2>Status</h2>
<p id="status">Checking...</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
